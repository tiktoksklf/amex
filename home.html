<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amex Style Dashboard</title>
  <style>
    :root {
      --amex-blue: #2f6287;
      --amex-blue-dark: #1f4d73;
      --bg: #f3f3f3;
      --card: #ffffff;
      --line: #e3e3e3;
      --text: #1f1f1f;
      --muted: #787878;
      --green: #2ea35b;
      --nav: #8d8d8d;
      --nav-active: #2f6287;
      --pay-bg: #dce8f4;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      padding-bottom: 88px;
      overflow-x: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 14px 8px;
    }

    .top-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--amex-blue);
      flex: 0 0 28px;
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
      text-align: center;
      line-height: 1.1;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: #6a6a6a;
      letter-spacing: 0.2px;
    }

    .card-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 10px 0 14px;
      padding: 0 14px;
    }

    .hero-card {
      width: 250px;
      position: relative;
      line-height: 0;
    }

    .hero-card img {
      width: 100%;
      display: block;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.14);
    }

    .content-pad {
      padding: 0 14px;
    }

    .panel {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.03);
    }

    .balance-label {
      font-size: 18px;
      color: #7a7a7a;
      margin-bottom: 2px;
    }

    .balance-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .balance {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin: 0 0 16px;
      letter-spacing: -0.3px;
    }

    .menu-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid var(--amex-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--amex-blue);
      font-size: 18px;
      font-weight: 700;
      flex: 0 0 auto;
      margin-top: 2px;
      line-height: 1;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 17px;
      color: #676767;
      margin: 7px 0;
    }

    .detail-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .info {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #5f8ea2;
      color: #5f8ea2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 18px;
    }

    .link {
      display: inline-block;
      margin: 6px 0 18px;
      color: var(--amex-blue);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 0 -2px 14px;
    }

    .section-link {
      color: var(--amex-blue);
      font-size: 18px;
      text-decoration: none;
      font-weight: 500;
    }

    .pay-btn {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 8px;
      background: var(--pay-bg);
      color: var(--amex-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      cursor: pointer;
    }

    .pay-icon {
      width: 20px;
      height: 20px;
      border: 2px solid var(--amex-blue);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }

    .day-heading {
      font-size: 20px;
      font-weight: 700;
      margin: 0 2px 12px;
    }

    .activity-card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.03);
    }

    .activity-title {
      font-size: 18px;
      color: #696969;
    }

    .activity-right {
      text-align: right;
      line-height: 1.15;
      flex: 0 0 auto;
    }

    .activity-amount,
    .activity-status {
      font-size: 18px;
      color: #505050;
    }

    .activity-status {
      color: #6a6a6a;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 430px;
      height: 70px;
      background: #fafafa;
      border-top: 1px solid #d8d8d8;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      z-index: 20;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      color: var(--nav);
      font-size: 12px;
    }

    .nav-item.active {
      color: var(--nav-active);
      font-weight: 700;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="top-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="6" width="18" height="12" rx="2"></rect>
          <path d="M7 10h10"></path>
          <path d="M7 14h4"></path>
        </svg>
      </div>

      <div class="title-wrap">
        <div class="title">American Express Platinum Card</div>
        <div class="subtitle">•••• 2650</div>
      </div>

      <div class="top-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.5-3.5"></path>
        </svg>
      </div>
    </header>

    <div class="card-wrap">
      <div class="hero-card">
        <img src="https://icm.aexp-static.com/acquisition/card-art/NUS000000363_480x304_straight_noname.png" alt="Amex Platinum Card">
      </div>
    </div>

    <main class="content-pad">
      <section class="panel">
        <div class="balance-label">Total Balance</div>
        <div class="balance-row">
          <div class="balance">$0.00</div>
          <div class="menu-btn">•••</div>
        </div>

        <div class="status">
          <span>Payment not required at this time</span>
          <span class="check">✓</span>
        </div>

        <div class="detail-row">
          <div>Remaining Statement Balance</div>
          <div>$0.00</div>
        </div>

        <div class="detail-row">
          <div class="detail-left">
            <span>No Preset Spending Limit</span>
            <span class="info">i</span>
          </div>
          <div></div>
        </div>

        <a href="#" class="link">More Details</a>

        <div class="divider"></div>
        <a href="#" class="section-link">Statements and Activity</a>
      </section>

      <button class="pay-btn" id="payBtn" type="button">
        <span class="pay-icon">$</span>
        <span>Make Payment</span>
      </button>

      <div class="day-heading">Dec 5</div>
      <div class="activity-card">
        <div class="activity-title">CORPORATE FILINGS</div>
        <div class="activity-right">
          <div class="activity-amount">$0.00</div>
          <div class="activity-status">Pending</div>
        </div>
      </div>

      <div class="day-heading">Dec 4</div>
    </main>

    <nav class="bottom-nav">
      <a href="#" class="nav-item active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"></path>
          </svg>
        </span>
        <span>Home</span>
      </a>

      <a href="#" class="nav-item">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l7 4v10l-7 4-7-4V7l7-4z"></path>
            <path d="M12 8l1.5 3 3.5.5-2.5 2.4.6 3.6L12 16l-3.1 1.5.6-3.6L7 11.5l3.5-.5z"></path>
          </svg>
        </span>
        <span>Membership</span>
      </a>

      <a href="#" class="nav-item">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v10"></path>
            <path d="M8 7h8"></path>
            <path d="M7 21h10"></path>
            <path d="M9 13c0 3 1.5 5 3 5s3-2 3-5v-2H9z"></path>
          </svg>
        </span>
        <span>Offers</span>
      </a>

      <a href="#" class="nav-item">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="8" r="4"></circle>
          </svg>
        </span>
        <span>Account</span>
      </a>
    </nav>
  </div>

  <script>
    document.getElementById('payBtn').addEventListener('click', function () {
      alert('Demo payment screen');
    });
  </script>

</body></html>
